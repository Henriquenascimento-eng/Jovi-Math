<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOVI Math – Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <!-- Fundo animado de partículas matemáticas -->
  <div class="math-bg" aria-hidden="true">
    <span class="math-symbol" style="--delay:0s;--x:10%;--size:1.2rem">∫</span>
    <span class="math-symbol" style="--delay:1s;--x:25%;--size:2rem">π</span>
    <span class="math-symbol" style="--delay:2s;--x:40%;--size:1rem">Σ</span>
    <span class="math-symbol" style="--delay:0.5s;--x:60%;--size:1.5rem">√</span>
    <span class="math-symbol" style="--delay:1.5s;--x:75%;--size:0.9rem">∞</span>
    <span class="math-symbol" style="--delay:3s;--x:88%;--size:1.8rem">Δ</span>
    <span class="math-symbol" style="--delay:2.5s;--x:50%;--size:1.1rem">θ</span>
    <span class="math-symbol" style="--delay:4s;--x:5%;--size:2.2rem">λ</span>
    <span class="math-symbol" style="--delay:3.5s;--x:92%;--size:1.4rem">α</span>
  </div>

  <!-- Card de login centralizado -->
  <main class="login-container">
    <div class="login-card glass-card">

      <!-- Logo / Branding -->
      <div class="login-brand">
        <div class="brand-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <rect width="40" height="40" rx="12" fill="#007AFF"/>
            <text x="20" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="white" font-family="system-ui">∑</text>
          </svg>
        </div>
        <h1 class="brand-name">JOVI <span class="brand-accent">Math</span></h1>
        <p class="brand-tagline">Resolução passo a passo com IA</p>
      </div>

      <!-- Formulário de Login -->
      <form id="login-form" class="login-form" novalidate>

        <div class="form-group">
          <label for="email" class="form-label">E-mail</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,12 2,6"/>
            </svg>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="seu@email.com"
              autocomplete="email"
              aria-required="true"
            />
          </div>
          <span class="form-error" id="email-error" role="alert" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Senha</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              aria-required="true"
            />
            <button type="button" class="toggle-password" id="toggle-password" aria-label="Mostrar senha">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-error" id="password-error" role="alert" aria-live="polite"></span>
        </div>

        <!-- Nome (usado para personalizar a saudação) -->
        <div class="form-group">
          <label for="username" class="form-label">Seu nome <span class="form-hint">(para personalizar a experiência)</span></label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="Ex: Lucas"
              autocomplete="name"
            />
          </div>
          <span class="form-error" id="username-error" role="alert" aria-live="polite"></span>
        </div>

        <button type="submit" class="btn-primary btn-login" id="login-btn">
          <span class="btn-text">Entrar</span>
          <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <!-- Credenciais de demo -->
      <div class="demo-credentials">
        <p class="demo-label">Credenciais de demo</p>
        <code class="demo-code">email: lucas@fiap.com.br &nbsp;|&nbsp; senha: qualquer coisa</code>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
